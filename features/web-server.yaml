# Optional Web Server Feature
# Enables a web interface to monitor and control the device
# Access via http://[device-name].local or http://[ip-address]
#
# Note: OTA updates are disabled for the web server to avoid conflicts
# with the main OTA configuration. OTA updates will continue to work
# through the ESPHome API.

web_server:
  port: 80
  js_url: "https://cdn.jsdelivr.net/gh/philip2809/neato-connected@next/docs/esphome-config/1.2-b.7.js"
  local: true
  ota: false  # Disable web server OTA to use only ESPHome API OTA
